name: CI

on:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      
      # TODO: adicionar um passo para compilar a aplicacao Go.
      # Dica: use apenas um comando.
      - name: Build do programa Go
        run: go build cmd/app/main.go

      # TODO: adicionar um passo para executar os testes.
      # Dica: use apenas um comando.
      - name: Rodar Testes
        run: go test ./... -v
